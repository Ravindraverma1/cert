# =============================================================================
# Camunda 8.5 Self-Managed -> aks-ded-dev-weu-01 (PRIVATE cluster, shared dev)
# RG       : DED_Project   | Sub: de33857c-3d3d-483b-8c75-361b787f3a69
# Access   : ONLY from vm-mgmt-ded-dev-weu-01 (private API endpoint)
# Ingress  : dedicated INTERNAL nginx (class nginx-camunda) -> private VNet IP
# Zeebe    : INTERNAL Azure LB (no public IP)
# Storage  : ${STORAGE_CLASS} (verify: kubectl get storageclass)
# Host     : ${HOST}  (script sets this = <internal-ingress-IP>.nip.io)
# Chart    : camunda/camunda-platform 10.11.2  (Camunda 8.5.x)
# =============================================================================

global:
  identity:
    auth:
      enabled: true
      publicIssuerUrl: "http://${HOST}/auth/realms/camunda-platform"
      operate:
        redirectUrl: "http://${HOST}/operate"
      tasklist:
        redirectUrl: "http://${HOST}/tasklist"

  # Use the DEDICATED internal ingress class so we never touch the existing
  # DED microservices ingress controller.
  ingress:
    enabled: true
    className: nginx-camunda
    host: "${HOST}"
    tls:
      enabled: false

identity:
  contextPath: "/identity"
  fullURL: "http://${HOST}/identity"
  keycloak:
    postgresql:
      enabled: true
      primary:
        persistence:
          enabled: true
          storageClass: ${STORAGE_CLASS}
          size: 16Gi

operate:
  contextPath: "/operate"

tasklist:
  contextPath: "/tasklist"

# Single-node dev broker, persistent PVC on managed disk
zeebe:
  clusterSize: 1
  partitionCount: 1
  replicationFactor: 1
  pvcSize: 32Gi
  pvcStorageClassName: ${STORAGE_CLASS}
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "1",    memory: "2Gi" }

# gRPC 26500 via INTERNAL Azure LB (private VNet IP, reachable from mgmt VM)
zeebeGateway:
  replicas: 1
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  ingress:
    grpc:
      enabled: false

elasticsearch:
  enabled: true
  master:
    replicaCount: 1
    persistence:
      enabled: true
      storageClass: ${STORAGE_CLASS}
      size: 64Gi
    resources:
      requests: { cpu: "500m", memory: "1Gi" }
      limits:   { cpu: "1",    memory: "2Gi" }

# ─── Off by default to keep the shared dev cluster light ─────────────────────
optimize:
  enabled: false
connectors:
  enabled: false      # flip to true if you need inbound/outbound connectors
webModeler:
  enabled: false      # enterprise: needs registry.camunda.cloud pull secret
console:
  enabled: false
